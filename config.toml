baseURL = ''
languageCode = 'en-us'
title = 'Atomsite'
theme = ["JoeTheme","hugo-cite"]
timeout = "21600s"

[markup]
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    hl_Lines = ''
    lineAnchors = ''
    lineNoStart = 1
    lineNos = true
    lineNumbersInTable = true
    noClasses = true
    style = 'dracula'
    tabWidth = 2
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 4
    ordered = false

